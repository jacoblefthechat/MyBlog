<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Post Title</title>
</head>
<body>
    <header>
        <h1><a href="index.html" style="text-decoration:none; color:inherit;">← Back Home</a></h1>
        <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider"></span>
    </header>

    <main>
        <article class="post" style="border:none; padding-top: 50px;">
            <h2>YOUR POST TITLE HERE</h2>
            <section class="content">
                <p>This is where your long-form article goes. You can write as much as you want here!</p>
                <p>Add another paragraph about your secret strategy...</p>
            </section>
        </article>
    </main>

    <script>
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;

    // Check if user previously chose Dark Mode
    if (localStorage.getItem('dark-mode') === 'enabled') {
        body.classList.add('dark-mode');
        toggle.checked = true;
    }

    toggle.addEventListener('change', () => {
        if (toggle.checked) {
            body.classList.add('dark-mode');
            localStorage.setItem('dark-mode', 'enabled');
        } else {
            body.classList.remove('dark-mode');
            localStorage.setItem('dark-mode', null);
        }
    });
</script>

</body>
</html>
